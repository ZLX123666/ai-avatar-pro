<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Avatar Pro · 订单管理</title>
<style>
  :root {
    --bg: #08080D; --card-bg: #111118; --text: #e0e0e0;
    --accent: #FF2D55; --accent2: #FF6B00; --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .header { padding:2rem; text-align:center; border-bottom:1px solid var(--border); }
  .header h1 { font-weight:900; background:linear-gradient(135deg,#FF2D55,#FF6B00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .container { max-width:1000px; margin:0 auto; padding:2rem; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
  .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:1.5rem; text-align:center; }
  .stat-card .num { font-size:2.5rem; font-weight:900; color:var(--accent); }
  .stat-card .lbl { color:#888; font-size:0.85em; margin-top:0.3rem; }
  table { width:100%; border-collapse:collapse; background:var(--card-bg); border-radius:16px; overflow:hidden; border:1px solid var(--border); }
  th { background:rgba(255,45,85,0.1); padding:1rem; text-align:left; font-size:0.85em; text-transform:uppercase; letter-spacing:1px; }
  td { padding:1rem; border-top:1px solid var(--border); font-size:0.9em; }
  .status { padding:3px 12px; border-radius:20px; font-size:0.78em; font-weight:700; }
  .status.pending { background:rgba(255,107,0,0.2); color:#FF6B00; }
  .status.paid { background:rgba(7,193,96,0.2); color:#07C160; }
  .status.delivered { background:rgba(0,245,255,0.15); color:#00F5FF; }
  .empty { text-align:center; padding:3rem; color:#666; }
  .btn { padding:0.5rem 1rem; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.85em; transition:all 0.3s; }
  .btn-deliver { background:var(--accent); color:#fff; }
  .btn-deliver:hover { opacity:0.85; }
  .btn-delivered { background:#333; color:#666; cursor:default; }
  .btn-export { background:rgba(255,255,255,0.06); color:#fff; margin-bottom:1rem; }
  @media(max-width:768px){ .stats{grid-template-columns:repeat(2,1fr);} table{font-size:0.8em;} }
</style>
</head>
<body>

<div class="header">
  <h1>📊 AI Avatar Pro · 订单管理</h1>
  <p style="color:#666;margin-top:0.5rem;">所有订单数据存储在浏览器 localStorage 中</p>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">总订单</div></div>
    <div class="stat-card"><div class="num" id="statPending">0</div><div class="lbl">待处理</div></div>
    <div class="stat-card"><div class="num" id="statRevenue">￥0</div><div class="lbl">总收入</div></div>
    <div class="stat-card"><div class="num" id="statDelivered">0</div><div class="lbl">已交付</div></div>
  </div>

  <button class="btn btn-export" onclick="exportCSV()">📥 导出 CSV</button>

  <table id="orderTable">
    <thead><tr><th>订单号</th><th>时间</th><th>套餐</th><th>风格</th><th>邮箱</th><th>金额</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="orderBody"><tr><td colspan="8" class="empty">暂无订单数据</td></tr></tbody>
  </table>
</div>

<script>
'use strict';

function getOrders() {
  return JSON.parse(localStorage.getItem('aiAvatarOrders') || '[]');
}

function saveOrders(orders) {
  localStorage.setItem('aiAvatarOrders', JSON.stringify(orders));
  renderOrders();
}

function renderOrders() {
  var orders = getOrders();
  var tbody = document.getElementById('orderBody');

  // Stats
  var totalRevenue = orders.reduce(function(s,o){return s+(o.plan?o.plan.price:0);},0);
  var delivered = orders.filter(function(o){return o.status==='delivered';}).length;
  var pending = orders.filter(function(o){return o.status!=='delivered';}).length;
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statRevenue').textContent = '￥'+totalRevenue;
  document.getElementById('statDelivered').textContent = delivered;

  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无订单数据 · 订单会在用户提交时自动出现</td></tr>';
    return;
  }

  tbody.innerHTML = orders.map(function(o,i){
    var status = o.status || 'pending';
    var statusLabels = { pending:'待处理', paid:'已付款', delivered:'已交付' };
    var btnHTML = status === 'delivered'
      ? '<button class="btn btn-delivered" disabled>已交付</button>'
      : '<button class="btn btn-deliver" onclick="markDelivered('+i+')">标记已交付</button>';
    return '<tr>'+
      '<td><code>'+o.id+'</code></td>'+
      '<td>'+new Date(o.time).toLocaleString('zh-CN')+'</td>'+
      '<td>'+(o.plan?o.plan.name:'?')+'</td>'+
      '<td>'+o.style+'</td>'+
      '<td>'+o.email+'</td>'+
      '<td>￥'+(o.plan?o.plan.price:'?')+'</td>'+
      '<td><span class="status '+status+'">'+statusLabels[status]+'</span></td>'+
      '<td>'+btnHTML+'</td>'+
      '</tr>';
  }).join('');
}

function markDelivered(index) {
  var orders = getOrders();
  orders[index].status = 'delivered';
  saveOrders(orders);
}

function exportCSV() {
  var orders = getOrders();
  var csv = '订单号,时间,套餐,风格,邮箱,金额,状态,备注\n';
  orders.forEach(function(o){
    csv += [o.id, o.time, o.plan?o.plan.name:'', o.style, o.email, '￥'+(o.plan?o.plan.price:''), o.status||'pending', o.note||''].join(',') + '\n';
  });
  var blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ai-avatar-orders-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// Check for new orders every 3 seconds (for demo purposes)
renderOrders();
setInterval(renderOrders, 3000);
</script>
</body>
</html>
